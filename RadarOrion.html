<!DOCTYPE HTML>
<html lang="vi">

<head>
    <meta charset="utf-8">
    <title>RadarOrion</title>
</head>

<body>
    <canvas id="radarCanvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('radarCanvas');
        const ctx = canvas.getContext('2d');
        const incomingFlights = [
            { id: "VN11", x: 150, y: 200, speed: 2 },
            { id: "JS404", x: null, y: "ba trăm", speed: 1 }, // LỖI: Tọa độ sai kiểu dữ liệu
            { id: "US55", x: 400, y: 150, speed: 3 },
            null, // LỖI: Object bị rỗng
            { id: "ER99" } // LỖI: Thiếu tọa độ
        ];
        function sanitizeFlight(flight) {
            if (!flight || typeof flight !== "object") return null;
            const x = Number(flight.x);
            const y = Number(flight.y);
            if (!Number.isFinite(x) || !Number.isFinite(y)) return null;
            return {
                id: flight.id ?? "UNKNOWN",
                x,
                y,
                speed: Number(flight.speed) || 0
            };
        }
        function drawRadar(flights) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (const flight of flights) {
                const clean = sanitizeFlight(flight);
                if (!clean) continue;
                ctx.beginPath();
                ctx.arc(clean.x, clean.y, 5, 0, Math.PI * 2);
                ctx.fillStyle = "lime";
                ctx.fill();
            }
        }
        drawRadar(incomingFlights);
        console.log(sanitizeFlight(incomingFlights[0]));
        console.log(sanitizeFlight(incomingFlights[1]));
        console.log(sanitizeFlight(incomingFlights[3]));
    </script>
</body>

</html>
